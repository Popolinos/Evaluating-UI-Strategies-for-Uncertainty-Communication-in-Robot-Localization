<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interface B — Descrição do Ambiente</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: monospace;
    background: #1a1a1a;
    color: #e0e0e0;
    padding: clamp(12px, 3vw, 32px);
    min-height: 100vh;
  }
  .snav { display: flex; gap: 8px; margin-bottom: clamp(12px, 2vw, 20px); flex-wrap: wrap; }
  .sbtn {
    padding: clamp(5px, 1vw, 8px) clamp(12px, 2vw, 20px);
    border-radius: 20px; border: 1px solid #444;
    background: #222; color: #888; cursor: pointer;
    font-size: clamp(11px, 1.5vw, 14px);
    font-family: monospace; transition: all 0.15s;
  }
  .sbtn:hover { border-color: #666; color: #ccc; }
  .sbtn.s1.active { background: #2E7D32; border-color: #2E7D32; color: #fff; }
  .sbtn.s2.active { background: #E65100; border-color: #E65100; color: #fff; }
  .sbtn.s3.active { background: #E65100; border-color: #E65100; color: #fff; }
  .sbtn.s4.active { background: #B71C1C; border-color: #B71C1C; color: #fff; }
  .sbtn.s5.active { background: #B71C1C; border-color: #B71C1C; color: #fff; }

  .panel { border-radius: clamp(8px, 1.5vw, 14px); overflow: hidden; width: 100%; max-width: 960px; }
  .phdr {
    background: #0e0e0e; color: #ff4444;
    padding: clamp(8px, 1.5vw, 12px) clamp(12px, 2vw, 20px);
    font-size: clamp(9px, 1.2vw, 11px); letter-spacing: 2px; text-transform: uppercase;
    display: flex; align-items: center; justify-content: space-between;
  }
  .dot {
    width: clamp(5px, 1vw, 8px); height: clamp(5px, 1vw, 8px);
    border-radius: 50%; background: #ff4444;
    display: inline-block; margin-right: 8px; animation: blink 1.2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }
  .pbody {
    background: #141414;
    padding: clamp(14px, 2.5vw, 24px);
    border: 1px solid #2a2a2a; border-top: none;
  }
  .slabel {
    font-size: clamp(9px, 1.2vw, 11px);
    color: #aaa; letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: clamp(8px, 1.5vw, 12px);
  }

  /* ── Descrição ── */
  .desc-box {
    background: #0e0e0e;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: clamp(16px, 3vw, 28px) clamp(18px, 3vw, 30px);
    margin-bottom: clamp(14px, 2.5vw, 24px);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: clamp(80px, 12vw, 120px);
    text-align: center;
  }
  .desc-text {
    font-size: clamp(14px, 2.2vw, 22px);
    color: #e8e8e8;
    line-height: 1.6;
    letter-spacing: 0.3px;
  }
  .cursor {
    display: inline-block;
    color: #ff4444;
    animation: cursorblink 0.7s infinite;
    margin-left: 2px;
    font-weight: bold;
  }
  @keyframes cursorblink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── Maps ── */
  .mgrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(8px, 1.5vw, 16px);
  }
  .mcard {
    background: #141414; border: 1px solid #2a2a2a;
    border-radius: clamp(6px, 1vw, 10px);
    padding: clamp(10px, 1.5vw, 16px);
    display: flex; flex-direction: column; align-items: center;
    gap: clamp(6px, 1vw, 10px);
    position: relative;
    overflow: hidden;
  }
  /* scanline sweep — purely decorative, no button affordance */
  .mcard::after {
    content: '';
    position: absolute;
    top: -100%;
    left: 0;
    width: 100%;
    height: 40%;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      rgba(255,255,255,0.04) 40%,
      rgba(255,255,255,0.07) 50%,
      rgba(255,255,255,0.04) 60%,
      transparent 100%
    );
    pointer-events: none;
    transition: none;
  }
  .mcard:hover::after, .mcard:active::after {
    animation: scanline 0.9s ease-in-out;
  }
  @keyframes scanline {
    0%   { top: -40%; }
    100% { top: 110%; }
  }
  .mlabel { font-size: clamp(10px, 1.3vw, 12px); color: #aaa; letter-spacing: 1px; }
  .mcard img {
    max-width: 100%;
    height: clamp(70px, 10vw, 140px);
    object-fit: contain;
    filter: invert(1) grayscale(1) brightness(0.75);
    transition: filter 0.25s;
  }
  #stag { font-size: clamp(10px, 1.3vw, 12px); color: #ccc; letter-spacing: 1px; }

  @media (max-width: 520px) {
    .mgrid { grid-template-columns: 1fr; }
    .mcard img { height: clamp(100px, 40vw, 180px); }
  }
  @media (min-width: 521px) and (max-width: 768px) {
    .mcard img { height: clamp(60px, 12vw, 100px); }
  }
</style>
</head>

<script>
const scenarios = [
  { id:3, cls:'s3', tag:'Cenário 1',
    desc:'Corredor após uma curva à direita, sem bifurcações.' },
  { id:1, cls:'s1', tag:'Cenário 2',
    desc:'Corredor se curvando à direita, sem bifurcações.' },
  { id:5, cls:'s5', tag:'Cenário 3',
    desc:'Corredor com uma bifurcação à frente.' },
  { id:2, cls:'s2', tag:'Cenário 4',
    desc:'Corredor com duas opções visíveis: seguir em frente ou virar à direita.' },
  { id:4, cls:'s4', tag:'Cenário 5',
    desc:'Corredor após uma curva à direita, com uma bifurcação à frente.' },
];

let typeInterval = null;

function typewrite(text, el, speed=38) {
  if (typeInterval) clearInterval(typeInterval);
  el.textContent = '';
  // add blinking cursor
  el.innerHTML = '<span class="cursor">▋</span>';
  let i = 0;
  typeInterval = setInterval(() => {
    if (i < text.length) {
      el.innerHTML = text.slice(0, i+1) + '<span class="cursor">▋</span>';
      i++;
    } else {
      el.innerHTML = text; // remove cursor when done
      clearInterval(typeInterval);
    }
  }, speed);
}

function render(s, idx){
  document.getElementById('stag').textContent = s.tag;
  typewrite(s.desc, document.getElementById('desc-text'));
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.sbtn')[idx].classList.add('active');
}

const nav=document.getElementById('nav');
scenarios.forEach((s,i)=>{
  const btn=document.createElement('button');
  btn.className='sbtn s'+s.id;
  btn.textContent='C'+(i+1);
  btn.onclick=()=>render(s,i);
  nav.appendChild(btn);
});
render(scenarios[0], 0);
</script>
