<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; padding: 24px; }
  .snav { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .sbtn {
    padding: 7px 18px; border-radius: 20px; border: 1px solid #444;
    background: #222; color: #888; cursor: pointer; font-size: 13px;
    font-family: monospace; transition: all 0.15s;
  }
  .sbtn:hover { border-color: #666; color: #ccc; }
  .sbtn.s1.active { background: #2E7D32; border-color: #2E7D32; color: #fff; }
  .sbtn.s2.active { background: #E65100; border-color: #E65100; color: #fff; }
  .sbtn.s3.active { background: #E65100; border-color: #E65100; color: #fff; }
  .sbtn.s4.active { background: #B71C1C; border-color: #B71C1C; color: #fff; }
  .sbtn.s5.active { background: #B71C1C; border-color: #B71C1C; color: #fff; }
  .panel { border-radius: 12px; overflow: hidden; max-width: 860px; }
  .phdr {
    background: #0e0e0e; color: #ff4444; padding: 10px 18px;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    display: flex; align-items: center; justify-content: space-between;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #ff4444;
    display: inline-block; margin-right: 8px; animation: blink 1.2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }
  .pbody { background: #141414; padding: 20px; border: 1px solid #2a2a2a; border-top: none; }
  .slabel { font-size: 10px; color: #aaa; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
  .lidar-wrap {
    display: flex; justify-content: center; margin-bottom: 20px;
  }
  .lidar-wrap img { display: block; max-height: 170px; border-radius: 16px; }
  .mgrid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
  @media (max-width: 600px) {
    .mgrid { grid-template-columns: 1fr; }
    .mcard img { max-height: 160px; }
    .panel { border-radius: 8px; }
    body { padding: 12px; }
    .lidar-wrap img { max-height: 220px; }
  }
  .mcard {
    background: #141414; border: 1px solid #2a2a2a; border-radius: 8px;
    padding: 14px; display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .mlabel { font-size: 11px; color: #aaa; letter-spacing: 1px; }
  .mcard img {
    max-width: 100%; max-height: 120px; object-fit: contain;
    filter: invert(1) grayscale(1) brightness(0.75);
  }
  .bwrap { width: 100%; }
  .bbg { background: #1e1e1e; border-radius: 3px; height: 7px; overflow: hidden; }
  .bfill { height: 7px; border-radius: 3px; transition: width .5s ease; }
  .pval { font-size: 20px; font-weight: 500; }
  .ph { color: #4CAF50; } .pm { color: #FF9800; } .pl { color: #cc2222; }
  #stag { font-size: 11px; color: #ccc; letter-spacing: 1px; }
</style>

const scenarios=[
  {id:1,cls:'s1',tag:'Cenário 1',          probs:[65,3,32]},
  {id:2,cls:'s2',tag:'Cenário 2', probs:[4,44,52]},
  {id:3,cls:'s3',tag:'Cenário 3',probs:[85,5,10]},
  {id:4,cls:'s4',tag:'Cenário 4',probs:[3,7,90]},
  {id:5,cls:'s5',tag:'Cenário 5',  probs:[3,49,47]},
];
function getColor(v){return v>=50?"#4CAF50":v>=20?"#FF9800":"#cc2222";}
function getCls(v){return v>=50?"ph":v>=20?"pm":"pl";}
function render(s){
  document.getElementById('stag').textContent=s.tag;
  document.getElementById('lidar-img').src=LIDAR[s.id-1];
  ['a','b','c'].forEach((m,i)=>{
    const v=s.probs[i];
    document.getElementById('bar-'+m).style.cssText='width:'+v+'%;background:'+getColor(v);
    const el=document.getElementById('val-'+m);
    el.textContent=v+'%'; el.className='pval '+getCls(v);
  });
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.sbtn[data-id="'+s.id+'"]').classList.add('active');
}
const nav=document.getElementById('nav');
scenarios.forEach(s=>{
  const btn=document.createElement('button');
  btn.className='sbtn '+s.cls; btn.dataset.id=s.id; btn.textContent='C'+s.id;
  btn.onclick=()=>render(s); nav.appendChild(btn);
});
render(scenarios[0]);
</script>
